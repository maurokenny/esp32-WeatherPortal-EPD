; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

[env]
platform = espressif32
framework = arduino
build_unflags = '-std=gnu++11'
build_flags = '-Wall' '-std=gnu++17'
lib_deps = 
	adafruit/Adafruit BME280 Library @ 2.3.0
	adafruit/Adafruit BME680 Library @ 2.0.5
	adafruit/Adafruit BusIO @ 1.17.4
	adafruit/Adafruit Unified Sensor @ 1.1.15
	bblanchon/ArduinoJson @ 7.4.2
	adafruit/Adafruit GFX Library @ 1.11.9

[env:esp32dev]
board = esp32dev
monitor_speed = 115200
monitor_filters = 
    log2file
    time
    esp32_exception_decoder
board_build.partitions = huge_app.csv
board_build.f_cpu = 80000000L
extra_scripts = pre:load_env.py, pre:build_web_ui.py
lib_deps = 
	zinggjm/GxEPD2@^1.6.5
	bblanchon/ArduinoJson@^7.4.2
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit BME280 Library@^2.3.0
	mathieucarbou/AsyncTCP @ ^3.2.4
	mathieucarbou/ESPAsyncWebServer @ ^3.3.17
	ricmoo/QRCode @ ^0.0.1
build_flags = 
    ${env.build_flags}
    -Wno-unknown-pragmas

[env:firebeetle32]
board = firebeetle32
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.f_cpu = 80000000L
extra_scripts = pre:load_env.py, pre:build_web_ui.py
lib_deps = 
	zinggjm/GxEPD2@^1.6.5
	bblanchon/ArduinoJson@^7.4.2
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit BME280 Library@^2.3.0

; ============================================================================
; Native Environment for Unit Tests
; ============================================================================
[env:native]
platform = native
; IMPORTANT: Override inherited framework=arduino from [env]
framework = 
test_framework = unity
build_flags = 
    -D UNIT_TEST
    -D LOCALE=en_US
    -I test/native_mock
    -include test/native_mock/_strftime_mock.h
    -std=c++17
    -Wall
; Build source files with tests
test_build_src = yes
; Only compile state_decision.cpp (pure logic, no hardware deps)
build_src_filter = +<state_decision.cpp>
; Only run state machine tests (not blackbox)
test_filter = test_state_machine
; Prevent downloading hardware libraries inherited from [env]
lib_deps = 
; Ignore Arduino libraries that don't work on native
lib_ignore = 
    ArduinoJson
    Adafruit BusIO
    Adafruit Unified Sensor
    Adafruit BME280 Library
    Adafruit BME680 Library
    Adafruit GFX Library
    GxEPD2
    AsyncTCP
    ESPAsyncWebServer
    QRCode

; ============================================================================
; Blackbox Integration Test Environment
; ============================================================================
; This environment runs the firmware in native mode against a FastAPI mock server
; to validate icon display logic through end-to-end testing.
;
; Architecture:
;   Firmware (C++) → Parse JSON → Render Mock → Mock Server
;
; Test Flow:
;   1. Test sets scenario on mock server (POST /test/scenario/{name})
;   2. Test fetches weather data (GET /v1/forecast)
;   3. parseOpenMeteo() parses JSON
;   4. RenderMock captures drawing operations
;   5. Events sent to mock server (POST /test/events)
;   6. Pattern validator checks results (POST /test/validate)
;   7. Report available (GET /test/report)
;
; Usage:
;   # Start mock server
;   cd test/mock_server && docker build -t weather-epd-mock . && docker run -p 8080:8080 weather-epd-mock
;   
;   # Run tests
;   pio test -e blackbox
;
[env:blackbox]
platform = native
; IMPORTANT: Override inherited framework=arduino from [env]
; native platform cannot use Arduino framework
framework = 
test_framework = unity
  
build_flags = 
    -D BLACKBOX_TEST
    -D UNIT_TEST
    -D LOCALE=en_US
    -D MOCK_SERVER_URL=\"http://localhost:8080\"
    -I test/native_mock
    -I test/test_blackbox
    -I include
    -std=c++17
    -Wall
    -g
    -O0
build_src_filter = -<*> +<conversions.cpp>
test_filter = test_blackbox
test_build_src = yes
; Prevent downloading hardware libraries inherited from [env]
lib_deps = 
lib_ignore = 
    ArduinoJson
    Adafruit BusIO
    Adafruit Unified Sensor
    Adafruit BME280 Library
    Adafruit BME680 Library
    Adafruit GFX Library
    GxEPD2
    AsyncTCP
    ESPAsyncWebServer
    QRCode

; ============================================================================
; BLACKBOX TESTS - Unit-Specific Environments
; ============================================================================
; Each environment tests a specific unit configuration.
; Run: pio test -e <environment_name>
; Or use: ./run_all_units_tests.sh

; Temperature Units
[env:blackbox-temp-c]
extends = env:blackbox
build_flags = 
    ${env:blackbox.build_flags}
    -D UNITS_TEMP_CELSIUS

[env:blackbox-temp-f]
extends = env:blackbox
build_flags = 
    ${env:blackbox.build_flags}
    -D UNITS_TEMP_FAHRENHEIT

